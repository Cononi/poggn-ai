name: Codex Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-verify:
    name: codex-verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Quality gate
        run: python3 .codex/script/codex_quality.py gate --for-ai

      - name: Security gate
        run: python3 .codex/script/codex_security.py gate

      - name: Template tests
        run: python3 .codex/script/codex_test_runner.py --for-ai
